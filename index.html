<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="toolbar">
    <button type="button" id="settings-toggle" class="toolbar-btn" aria-label="Open settings" aria-expanded="false">Settings</button>
  </div>

  <div id="settings-panel" class="settings-panel" hidden>
    <div class="settings-panel-header">
      <h2>Settings</h2>
      <button type="button" id="settings-close" class="settings-close" aria-label="Close settings">Close</button>
    </div>

    <label class="settings-field" for="search-engine-select">Search engine</label>
    <select id="search-engine-select" class="settings-select">
      <option value="bing">Bing</option>
      <option value="google">Google</option>
      <option value="baidu">Baidu</option>
    </select>

    <div class="settings-section">
      <label class="settings-field" for="display-name-input">Your name</label>
      <input
        type="text"
        id="display-name-input"
        class="settings-input"
        placeholder="Enter your name"
        maxlength="24"
        autocomplete="off"
      >
    </div>

    <div class="settings-section">
      <span class="settings-field">Theme test</span>
      <div id="theme-preview-controls" class="theme-preview-controls">
        <button type="button" class="theme-preview-btn is-active" data-theme-preview="auto">Auto</button>
        <button type="button" class="theme-preview-btn" data-theme-preview="morning">Morning</button>
        <button type="button" class="theme-preview-btn" data-theme-preview="noon">Noon</button>
        <button type="button" class="theme-preview-btn" data-theme-preview="afternoon">Afternoon</button>
        <button type="button" class="theme-preview-btn" data-theme-preview="night">Night</button>
      </div>
    </div>
  </div>

  <div class="main-container">

    <!-- 问候语模块 -->
    <div class="greeting-module">
      <h1 id="greeting">你好</h1>
    </div>

    <!-- 搜索模块 -->
    <div class="search-module animate__animated animate__fadeInDown">
      <form id="search-form">
        <span id="search-engine-tag" class="search-engine-tag" aria-hidden="true">Bing</span>
        <input type="text" id="search-input" placeholder="搜索..." autocomplete="off">
        <button type="submit" id="search-btn" aria-label="Search">→</button>
      </form>
      <!-- 搜索历史下拉框 -->
      <div id="search-history" class="search-history"></div>
    </div>

    <!-- 快捷书签模块 -->
    <div class="bookmark-module animate__animated animate__fadeInUp animate__delay-1">
      <div id="bookmark-list" class="bookmark-list"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
